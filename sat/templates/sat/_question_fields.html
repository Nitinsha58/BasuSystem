{# Shared question field partial — used in both add and edit forms #}
<div class="mb-3">
    <label class="form-label fw-medium small">Question Text <span class="text-muted fw-normal">(Markdown supported:
            **bold**, *italic*, `code`)</span></label>
    <textarea name="text" class="form-control font-monospace" rows="4"
        placeholder="e.g. If **2x + 3 = 11**, what is the value of *x*?">{{ q.text|default:'' }}</textarea>
    <div class="mt-2">
        <div class="text-muted" style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">
            Preview</div>
        <div class="preview-pane"></div>
    </div>
</div>
<div class="row g-2 mb-3">
    <div class="col-md-6">
        <label class="form-label small fw-medium">Option A</label>
        <input type="text" name="option_a" class="form-control form-control-sm" required
            value="{{ q.option_a|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label small fw-medium">Option B</label>
        <input type="text" name="option_b" class="form-control form-control-sm" required
            value="{{ q.option_b|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label small fw-medium">Option C</label>
        <input type="text" name="option_c" class="form-control form-control-sm" required
            value="{{ q.option_c|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label small fw-medium">Option D</label>
        <input type="text" name="option_d" class="form-control form-control-sm" required
            value="{{ q.option_d|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label small fw-medium">Option E <span class="text-muted fw-normal">(optional)</span></label>
        <input type="text" name="option_e" class="form-control form-control-sm" value="{{ q.option_e|default:'' }}">
    </div>
</div>
<div class="row g-2">
    <div class="col-md-3">
        <label class="form-label small fw-medium">Correct Answer</label>
        <select name="correct_answer" class="form-select form-select-sm">
            {% for val, label in answer_choices %}
            <option value="{{ val }}" {% if q.correct_answer == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label small fw-medium">Difficulty</label>
        <select name="difficulty" class="form-select form-select-sm">
            {% for val, label in difficulty_choices %}
            <option value="{{ val }}" {% if q.difficulty == val %}selected{% elif not q and val == 'L2' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label small fw-medium">Subject Tag</label>
        <select name="subject_tag" class="form-select form-select-sm">
            {% for val, label in subject_choices %}
            <option value="{{ val }}" {% if q.subject_tag == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
</div>
