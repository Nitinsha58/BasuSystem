{% with url_name=request.resolver_match.url_name %}
<div style="background:#f4f5f7; border-bottom:1px solid #e2e4e9; padding:10px 16px; margin-bottom:0;">
    <div style="max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:4px;">
        <span style="font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0d1b3e;margin-right:12px;white-space:nowrap;">SAT</span>
        <a href="{% url 'sat:paper_list' %}"
            style="text-decoration:none;font-size:12px;font-weight:600;padding:5px 14px;border-radius:4px;white-space:nowrap;
                   {% if 'paper' in url_name %}
                   background:#0d1b3e;color:#fff;
                   {% else %}
                   background:transparent;color:#374151;
                   {% endif %}">
            Papers
        </a>
        <a href="{% url 'sat:assignment_list' %}"
            style="text-decoration:none;font-size:12px;font-weight:600;padding:5px 14px;border-radius:4px;white-space:nowrap;
                   {% if 'assignment' in url_name %}
                   background:#0d1b3e;color:#fff;
                   {% else %}
                   background:transparent;color:#374151;
                   {% endif %}">
            Assignments
        </a>
        <a href="{% url 'sat:result_list' %}"
            style="text-decoration:none;font-size:12px;font-weight:600;padding:5px 14px;border-radius:4px;white-space:nowrap;
                   {% if 'result' in url_name %}
                   background:#0d1b3e;color:#fff;
                   {% else %}
                   background:transparent;color:#374151;
                   {% endif %}">
            Results
        </a>
    </div>
</div>
{% endwith %}
