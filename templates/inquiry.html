{% load static %}
<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
            --color-clifford: #da373d;
            }
        </style>
  <style>
    #phone-wrapper {
      position: relative;
    }

    #phone-wrapper::before {
      display: flex;
      justify-content: center;
      align-items: center;
      content: '+91';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      /* background-color: #1E283C; */
      transform-origin: bottom right;
      transition: transform 0.25s ease-out;
      font-size: 14px;
    }

    html {
      background-image: url("{% static 'images/background.png' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
    }
  </style>
</head>

<body>
  <nav class="bg-gray-100">
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
      <div class="relative flex h-16 items-center justify-between">
        <div class="flex flex-1 items-center sm:items-stretch sm:justify-start">

          <div class="flex shrink-0 items-center">
            <a href="https://basueducation.com" class="">
              <img class="h-8 w-auto" src="{% static 'images/BASU.svg' %}" alt="Your Company">
            </a>
          </div>

        </div>
      </div>
    </div>
  </nav>

  <div class="mx-auto max-w-7xl px-3 sm:px-6 lg:px-8 py-3 sm:py-6 lg:py-8">
    <div class="w-fit mx-auto">
      <h1 class="mb-4 text-2xl font-semibold leading-none tracking-tight text-gray-900">Get In Touch With Us.</h1>
    </div>
    <form class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 auto-rows-auto" method="post">
      {% csrf_token %}

      {% if messages %}
      <div class="md:col-span-2">
        {% for message in messages %}
        <div
          class="mb-3 rounded-lg border p-3 text-sm {% if 'success' in message.tags %}bg-green-50 border-green-200 text-green-800{% elif 'error' in message.tags %}bg-red-50 border-red-200 text-red-800{% elif 'warning' in message.tags %}bg-yellow-50 border-yellow-200 text-yellow-800{% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
          {{ message|safe }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <div class="">
        <label for="student-name" class="block mb-2 text-sm font-medium text-gray-900">Student Name</label>
        <input required type="text" id="student-name" name="student-name"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" />
      </div>

      <div class="">
        <label for="school-name" class="block mb-2 text-sm font-medium text-gray-900">School</label>
        <input type="text" required id="school-name" name="school-name"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" />
      </div>

      <div class="">
        <label for="classes" class="block mb-2 text-sm font-medium text-gray-900">Select Class</label>
        <select required id="classes" multiple size="{{classes.count}}" name="classes"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
          {% for cls in classes %}
          <option value="{{cls.id}}">{{cls.name}}</option>
          {% endfor %}
        </select>
      </div>

      <div class="">
        <label for="subjects" class="block mb-2 text-sm font-medium text-gray-900">Select Subjects</label>
        <select required id="subjects" multiple size="{{subjects.count}}" name="subjects"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
          {% for subject in subjects %}
          <option value="{{subject.id}}">{{subject.name}}</option>
          {% endfor %}
        </select>
      </div>

      <div class="">
        <label for="address" class="block mb-2 text-sm font-medium text-gray-900">Address</label>
        <input type="text" required id="address" name="address"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" />
      </div>

      <div class="">
        <label for="phone" class="block mb-2 text-sm font-medium text-gray-900">Phone</label>

        <div id="phone-wrapper">
          <input type="text" required id="phone" name="phone" minlength="10" maxlength="10"
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5" />
        </div>

        {% if request.user.is_superuser %}
        <div id="phone-suggestion"
          class="hidden mt-2 rounded-lg border border-gray-200 bg-white p-3 text-sm text-gray-800">
          <div class="flex items-center justify-between gap-2">
            <div>
              <span class="font-medium">Existing inquiry found.</span>
              <span id="phone-suggestion-text" class="text-gray-600"></span>
            </div>
            <a id="phone-suggestion-link" href="#" class="text-blue-700 hover:underline">Open</a>
          </div>
        </div>
        {% endif %}
      </div>

      <div class="">
        <label for="existing_member" class="block mb-2 text-sm font-medium text-gray-900">Are you an existing member of
          BASU Classes?</label>
        <select id="existing_member" required name="existing_member"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="">
        <label for="referral" class="block mb-2 text-sm font-medium text-gray-900">Where did you hear about us?</label>
        <select id="referral" required size="{{referrals.count}}" name="referral"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
          {% for referral in referrals %}
          <option value="{{referral.id}}">{{referral.name}}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Full-width Submit Button -->
      <div class="md:col-span-2 flex justify-center">
        <button type="submit"
          class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center">
          Send Query
        </button>
      </div>

    </form>


  </div>

  <script>
    const input = document.getElementById('phone');

    input.addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "").slice(0, 10); // Remove non-digits and limit to 10
    });

    const phoneSuggestion = document.getElementById('phone-suggestion');
    const phoneSuggestionText = document.getElementById('phone-suggestion-text');
    const phoneSuggestionLink = document.getElementById('phone-suggestion-link');

    if (phoneSuggestion && phoneSuggestionText && phoneSuggestionLink) {
      let phoneLookupTimer = null;

      function hidePhoneSuggestion() {
        phoneSuggestion.classList.add('hidden');
        phoneSuggestionText.textContent = '';
        phoneSuggestionLink.setAttribute('href', '#');
      }

      async function checkPhoneSuggestion(phone) {
        try {
          const url = new URL("{{ check_inquiry_phone_url }}", window.location.origin);
          url.searchParams.set('phone', phone);
          const res = await fetch(url.toString(), { headers: { 'Accept': 'application/json' } });
          if (!res.ok) {
            hidePhoneSuggestion();
            return;
          }
          const data = await res.json();
          if (!data.exists) {
            hidePhoneSuggestion();
            return;
          }
          phoneSuggestionText.textContent = ` ${data.name} (+91 ${data.phone})`;
          phoneSuggestionLink.setAttribute('href', data.url);
          phoneSuggestion.classList.remove('hidden');
        } catch (e) {
          hidePhoneSuggestion();
        }
      }

      input.addEventListener("input", function () {
        const phone = this.value;
        if (phoneLookupTimer) clearTimeout(phoneLookupTimer);
        if (phone.length !== 10) {
          hidePhoneSuggestion();
          return;
        }
        phoneLookupTimer = setTimeout(() => checkPhoneSuggestion(phone), 250);
      });

      document.addEventListener('click', function (e) {
        if (!phoneSuggestion.classList.contains('hidden')) {
          const phoneWrapper = document.getElementById('phone-wrapper');
          if (!phoneWrapper.contains(e.target) && !phoneSuggestion.contains(e.target)) {
            hidePhoneSuggestion();
          }
        }
      });
    }
  </script>

</body>

</html>
